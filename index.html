<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GesturePulse - Gen Z AR Kiosk Core</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <!-- MediaPipe Holistic tracks face, hands, and pose together -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/holistic/holistic.js" crossorigin="anonymous"></script>
    
    <style>
        .gradient-bg { background: linear-gradient(135deg, #070a13 0%, #0f1123 100%); }
        .card-flip { transform-style: preserve-3d; transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
        .card-flipped { transform: rotateY(180deg); }
        .backface-hidden { backface-visibility: hidden; }
        .rotate-y-180 { transform: rotateY(180deg); }
        @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-10px); } }
        .floating-emoji { animation: float 3s ease-in-out infinite; }
    </style>
</head>
<body class="gradient-bg text-white h-screen flex flex-col items-center justify-between p-6 font-sans overflow-hidden">

    <!-- Header Section -->
    <div class="text-center mt-1">
        <h1 class="text-4xl font-black tracking-tight bg-gradient-to-r from-pink-500 via-purple-500 to-cyan-400 bg-clip-text text-transparent">GESTUREPULSE AR CORE</h1>
        <p class="text-slate-400 font-medium text-sm mt-1">Unlock AR Filters & custom fortune vibes with your movements</p>
    </div>

    <!-- Main Workspace -->
    <div class="relative w-full max-w-5xl h-[65vh] flex gap-6 items-center justify-center">
        
        <!-- AR Camera Canvas Scanner Layer -->
        <div class="relative w-[60%] h-full rounded-3xl overflow-hidden border-4 border-cyan-500/30 bg-black shadow-2xl">
            <video id="webcam" class="hidden" autoplay playsinline></video>
            <canvas id="ar-canvas" class="w-full h-full object-cover"></canvas>
            
            <!-- Live Status HUD Overlay -->
            <div id="gesture-overlay" class="absolute top-6 left-6 bg-black/70 px-4 py-2 rounded-full border border-white/10 hidden items-center gap-2 backdrop-blur-md animate-pulse">
                <span id="overlay-emoji" class="text-2xl">⚡</span>
                <span id="overlay-text" class="text-sm font-black tracking-wider uppercase text-cyan-400">TRACKING</span>
            </div>

            <!-- The Hype Meter Loading Bar Layout -->
            <div class="absolute bottom-6 left-6 right-6 bg-black/50 h-5 rounded-full overflow-hidden border border-white/10 p-[3px] backdrop-blur-sm">
                <div id="hype-bar" class="h-full w-0 bg-gradient-to-r from-cyan-400 via-purple-500 to-pink-500 rounded-full transition-all duration-100 ease-out shadow-[0_0_15px_rgba(168,85,247,0.5)]"></div>
            </div>
        </div>

        <!-- The Gacha Box / Dynamic Feedback Card -->
        <div class="w-[40%] h-full flex flex-col items-center justify-center perspective-[1000px]">
            <div id="fortune-card" class="relative w-full h-[85%] card-flip rounded-3xl shadow-2xl">
                <!-- Front View -->
                <div class="absolute inset-0 bg-gradient-to-br from-slate-900 to-indigo-950 rounded-3xl flex flex-col items-center justify-center border-2 border-indigo-500/20 backface-hidden p-6 text-center">
                    <div id="box-emoji" class="text-8xl floating-emoji mb-4">🎁</div>
                    <h3 id="box-title" class="text-2xl font-black tracking-wide text-indigo-200">MYSTERY VAULT</h3>
                    <p id="box-desc" class="text-xs text-indigo-300/60 mt-2 px-4">Strike a vibe check pose for 3 seconds to reveal your destiny.</p>
                </div>
                <!-- Back View: Context-Aware Dynamic Compliment Card -->
                <div id="card-back-theme" class="absolute inset-0 rounded-3xl flex flex-col items-center justify-center border-2 backface-hidden rotate-y-180 p-6 text-center">
                    <div id="card-emoji" class="text-6xl mb-2">✨</div>
                    <h3 id="card-status-title" class="text-2xl font-black tracking-tight">VIBE STATUS</h3>
                    <p id="compliment-text" class="text-base font-bold italic mt-4 px-2 leading-relaxed">Evaluating your aura...</p>
                </div>
            </div>
        </div>

    </div>

    <!-- Live Logs Terminal Footer -->
    <div class="w-full max-w-5xl bg-slate-950/80 border border-slate-900 rounded-2xl p-4 backdrop-blur-md mb-1 flex justify-between items-center text-xs font-mono text-slate-500">
        <div>KIOSK FEEDBACK TARGET: <span class="text-cyan-400 font-bold">127.0.0.2:8000</span></div>
        <div id="system-logs">LOADING SYSTEM PIPELINES...</div>
    </div>

    <!-- Web Audio Synthesis Engine for Video Game Sound Effects -->
    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSoundEffect(type) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            if (type === 'charging') {
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(150, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(400, audioCtx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.02, audioCtx.currentTime); gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.1);
            } else if (type === 'success') {
                osc.type = 'triangle'; osc.frequency.setValueAtTime(300, audioCtx.currentTime);
                osc.frequency.setValueAtTime(400, audioCtx.currentTime + 0.1);
                osc.frequency.setValueAtTime(600, audioCtx.currentTime + 0.2);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime); gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.4);
            } else if (type === 'fail') {
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(200, audioCtx.currentTime);
                osc.frequency.linearRampToValueAtTime(80, audioCtx.currentTime + 0.3);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime); gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.3);
            }
            osc.start(); osc.stop(audioCtx.currentTime + 0.4);
        }
    </script>

    <!-- Core Interactive Operations Pipeline -->
    <script>
        const videoElement = document.getElementById('webcam');
        const canvasElement = document.getElementById('ar-canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const hypeBar = document.getElementById('hype-bar');
        const gestureOverlay = document.getElementById('gesture-overlay');
        const overlayEmoji = document.getElementById('overlay-emoji');
        const overlayText = document.getElementById('overlay-text');
        const fortuneCard = document.getElementById('fortune-card');
        const cardBackTheme = document.getElementById('card-back-theme');
        const cardEmoji = document.getElementById('card-emoji');
        const cardStatusTitle = document.getElementById('card-status-title');
        const complimentText = document.getElementById('compliment-text');
        const logDisplay = document.getElementById('system-logs');

        const GESTURES = {
            "THUMBS_UP":   { name: "Super Good", emoji: "😁", score: 5, category: "good" },
            "PERFECT":     { name: "Chef's Kiss", emoji: "🤩", score: 5, category: "good" },
            "FIST_PUMP":   { name: "Hype Explosion", emoji: "🔥", score: 5, category: "good" },
            "THUMBS_DOWN": { name: "Disappointed Vibe", emoji: "😞", score: 1, category: "bad" },
            "CROSS_ARMS":  { name: "No Way (X)", emoji: "🤬", score: 2, category: "bad" }
        };

        const TEXT_REWARDS = {
            "good": {
                title: "👑 IMMACULATE AURA",
                themeClass: "from-purple-600/90 to-pink-600/90 border-pink-400/50",
                emoji: "✨",
                quotes: [
                    "Your taste? Unmatched. Your aura? +1,000,000 points.",
                    "You have elite main character energy. Go buy a lottery ticket today.",
                    "The kitchen crew is literally crying tears of joy because of you right now."
                ]
            },
            "bad": {
                title: "🖤 DEPRESSION MODE",
                themeClass: "from-slate-950 to-zinc-900 border-red-500/30",
                emoji: "🌧️",
                quotes: [
                    "Damn, the vibe dropped below freezing. Let us run it back!",
                    "Ouch, our hearts are completely shattered. Give us one more chance to make it right!",
                    "Aura check: -50,000. Give us another shot to show you our true ultimate potential!"
                ]
            }
        };

        let currentActiveGesture = null;
        let gestureStartTime = null;
        let dataAlreadySentForThisSession = false;
        let lastFaceLandmarks = null;
        let activeARFilter = null; 

        const holistic = new Holistic({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/holistic/${file}`
        });

        holistic.setOptions({
            modelComplexity: 1,
            smoothLandmarks: true,
            minDetectionConfidence: 0.7,
            minTrackingConfidence: 0.7
        });

        holistic.onResults(onHolisticRuntimeFrameUpdate);

        const camera = new Camera(videoElement, {
            onFrame: async () => {
                await holistic.send({ image: videoElement });
            },
            width: 640,
            height: 480
        });
        camera.start();

        function onHolisticRuntimeFrameUpdate(results) {
            if (canvasElement.width !== results.image.width) {
                canvasElement.width = results.image.width;
                canvasElement.height = results.image.height;
            }

            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            canvasCtx.translate(canvasElement.width, 0);
            canvasCtx.scale(-1, 1);
            canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);
            canvasCtx.restore();

            lastFaceLandmarks = results.faceLandmarks ? results.faceLandmarks : null;

            let detected = null;
            if (results.rightHandLandmarks) detected = evaluateAdvancedHandMatrix(results.rightHandLandmarks);
            else if (results.leftHandLandmarks) detected = evaluateAdvancedHandMatrix(results.leftHandLandmarks);

            if (detected) {
                if (currentActiveGesture === detected) {
                    let duration = (Date.now() - gestureStartTime) / 1000;
                    if (duration < 3.0) playSoundEffect('charging');
                    updateVisualHypeMeter(duration, detected);
                } else {
                    currentActiveGesture = detected;
                    gestureStartTime = Date.now();
                    dataAlreadySentForThisSession = false;
                }
            } else {
                resetTrackingMetrics();
            }

            if (lastFaceLandmarks && activeARFilter) {
                renderDynamicARFilter(lastFaceLandmarks, activeARFilter);
            }
        }

        function evaluateAdvancedHandMatrix(lm) {
            const indexUp = lm[8].y < lm[6].y;
            const middleUp = lm[12].y < lm[10].y;
            const ringUp = lm[16].y < lm[14].y;
            const pinkyUp = lm[20].y < lm[18].y;

            const isHandInverted = lm[12].y > lm[0].y; 
            const thumbExtended = Math.abs(lm[4].x - lm[9].x) > 0.04;

            if (!isHandInverted && lm[4].y < lm[3].y && !indexUp && !middleUp && !ringUp && !pinkyUp) return "THUMBS_UP";
            if (isHandInverted && lm[4].y > lm[3].y && indexUp && middleUp && ringUp && pinkyUp) return "THUMBS_DOWN";
            if (!indexUp && !middleUp && !ringUp && !pinkyUp) return "FIST_PUMP";
            if (!indexUp && middleUp && ringUp && pinkyUp) return "PERFECT";
            if (indexUp && middleUp && ringUp && pinkyUp && Math.abs(lm[8].x - lm[20].x) < 0.1) return "CROSS_ARMS";

            return null;
        }

        function updateVisualHypeMeter(seconds, poseKey) {
            const config = GESTURES[poseKey];
            gestureOverlay.style.display = "flex";
            overlayEmoji.innerText = config.emoji;
            overlayText.innerText = config.name;

            let targetPercentage = Math.min((seconds / 3) * 100, 100);
            hypeBar.style.width = `${targetPercentage}%`;

            if (targetPercentage >= 100 && !dataAlreadySentForThisSession) {
                triggerHypeExplosion(config);
                transmitTelemetryPayload(poseKey, seconds);
                dataAlreadySentForThisSession = true;
            }
        }

        function triggerHypeExplosion(config) {
            const group = TEXT_REWARDS[config.category];
            
            cardBackTheme.className = `absolute inset-0 bg-gradient-to-br ${group.themeClass} rounded-3xl flex flex-col items-center justify-center border-2 backface-hidden rotate-y-180 p-6 text-center`;
            cardStatusTitle.innerText = group.title;
            cardEmoji.innerText = group.emoji;
            
            const randomQuote = group.quotes[Math.floor(Math.random() * group.quotes.length)];
            complimentText.innerText = `"${randomQuote}"`;
            
            fortuneCard.classList.add('card-flipped');

            if (config.category === "good") {
                playSoundEffect('success');
                confetti({ particleCount: 180, spread: 100, origin: { y: 0.6 } });
                activeARFilter = "CROWN"; 
            } else {
                playSoundEffect('fail');
                activeARFilter = "RAIN_CLOUD"; // Instantly triggers the rain cloud filter
            }
            
            logDisplay.innerText = `🎰 EXPERIENCE DISPATCHED: LOCKED FILTER MODE -> [${activeARFilter}]`;
        }

        function renderDynamicARFilter(landmarks, filterType) {
            const topHead = landmarks[10];
            const chin = landmarks[152];

            const headX = (1 - topHead.x) * canvasElement.width; 
            const headY = topHead.y * canvasElement.height;
            const faceScale = (chin.y - topHead.y) * canvasElement.height;

            canvasCtx.save();
            canvasCtx.font = `${faceScale * 0.9}px Arial`;
            canvasCtx.textBaseline = "middle";
            canvasCtx.textAlign = "center";

            if (filterType === "CROWN") {
                canvasCtx.fillText("👑", headX, headY - (faceScale * 0.35));
            } else if (filterType === "RAIN_CLOUD") {
                // Places the rain cloud beautifully floating above their head
                canvasCtx.fillText("🌧️", headX, headY - (faceScale * 0.35));
            }
            canvasCtx.restore();
        }

        function resetTrackingMetrics() {
            currentActiveGesture = null;
            gestureStartTime = null;
            hypeBar.style.width = "0%";
            gestureOverlay.style.display = "none";
        }

        async function transmitTelemetryPayload(poseKey, duration) {
            const gesture = GESTURES[poseKey];
            const payload = {
                client_id: "WEB_AR_KIOSK",
                location_id: "MAIN_FRONT_EXIT",
                detected_gesture: gesture.name,
                satisfaction_score: gesture.score,
                streak_duration_sec: parseFloat(duration.toFixed(2))
            };

            try {
                const response = await fetch("http://127.0.0.2:8000/api/v1/telemetry", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });
                if (response.status === 201) {
                    logDisplay.innerText = `📡 SERVER REGISTRATION: Verified '${gesture.name}' telemetry payload successfully.`;
                }
            } catch (err) {
                logDisplay.innerText = "⚠️ EDGE RUNTIME DISCONNECTED: Running locally offline.";
            }
        }
    </script>
</body>
</html>
